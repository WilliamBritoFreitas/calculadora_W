<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- imports -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <script src="./index.js" defer></script>
    <!-- ================================================== -->
    <title>Calculadora</title>
  </head>
  <body class="bg-black flex min-h-screen items-center justify-center">
    <div id="device">
      <h2 class="text-white">Calculadora</h2>
      <div id="Painel" class="px-1 py-3 text-4xl flex justify-end border-2 border-gray-500 w-64">
        <span id="display" class="text-white">0</span>
      </div>

      <div id="teclado" class="mt-4 w-64 grid grid-cols-4 gap-x-2 gap-y-1.5">
        <button id="bt_perc" class="w-full py-3 bg-gray-600 text-white rounded-xs hover:bg-gray-500">%</button>
        <button id="bt_CE" class="w-full py-3 bg-gray-600 text-white rounded-xs hover:bg-gray-500">CE</button>
        <button id="bt_C" class="w-full py-3 bg-gray-600 text-white rounded-xs hover:bg-gray-500">C</button>
        <button id="bt_bs" class="w-full py-3 bg-gray-600 text-white rounded-xs hover:bg-gray-500">&larr;</button>

        <button id="bt_mais" class="w-full py-3 bg-gray-600 text-white rounded-xs hover:bg-gray-500">+</button>
        <button id="bt_menos" class="w-full py-3 bg-gray-600 text-white rounded-xs hover:bg-gray-500">-</button>
        <button id="bt_multi" class="w-full py-3 bg-gray-600 text-white rounded-xs hover:bg-gray-500">x</button>
        <button id="bt_divide" class="w-full py-3 bg-gray-600 text-white rounded-xs hover:bg-gray-500">&divide;</button>

        <button class="bt_num w-full py-3 bg-gray-600 text-white rounded-xs hover:bg-gray-500">7</button>
        <button class="bt_num w-full py-3 bg-gray-600 text-white rounded-xs hover:bg-gray-500">8</button>
        <button class="bt_num w-full py-3 bg-gray-600 text-white rounded-xs hover:bg-gray-500">9</button>
        <button id="bt_igual" class="row-span-4 h-full w-full py-3 bg-gray-600 text-white rounded-xs hover:bg-gray-800">=</button>

        <button class="bt_num w-full py-3 bg-gray-600 text-white rounded-xs hover:bg-gray-500">4</button>
        <button class="bt_num w-full py-3 bg-gray-600 text-white rounded-xs hover:bg-gray-500">5</button>
        <button class="bt_num w-full py-3 bg-gray-600 text-white rounded-xs hover:bg-gray-500">6</button>
        <!-- <button class="w-full  py-3 bg-gray-600 text-white rounded-xs">t</button> -->

        <button class="bt_num w-full py-3 bg-gray-600 text-white rounded-xs hover:bg-gray-500">1</button>
        <button class="bt_num w-full py-3 bg-gray-600 text-white rounded-xs hover:bg-gray-500">2</button>
        <button class="bt_num w-full py-3 bg-gray-600 text-white rounded-xs hover:bg-gray-500">3</button>
        <!-- <button class="w-full  py-3 bg-gray-600 text-white rounded-xs">t</button> -->

        <button id="bt_troca" class="w-full py-3 bg-gray-600 text-white rounded-xs hover:bg-gray-500">+/-</button>
        <button id="bt_0" class="w-full py-3 bg-gray-600 text-white rounded-xs hover:bg-gray-500">0</button>
        <button id="bt_ponto" class="w-full py-3 bg-gray-600 text-white rounded-xs hover:bg-gray-500">,</button>
        <!-- <button class="w-full  py-3 bg-gray-600 text-white rounded-xs">t</button> -->
      </div>
    </div>
  </body>
  bt_
</html>
